# ===========================================================================
# Docker Compose – Standalone Energy Management ISO 50001
# ===========================================================================
# Startet alle Dienste für den Standalone-Betrieb:
#   - app:           FastAPI Backend + React Frontend + Celery
#   - timescaledb:   TimescaleDB (PostgreSQL mit Zeitreihen)
#   - redis:         Redis (Celery Message Broker)
#
# Starten:  docker compose up -d
# Stoppen:  docker compose down
# Logs:     docker compose logs -f app
# ===========================================================================

services:
  # ── TimescaleDB: Zeitreihendatenbank ──
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-energy_management}
      POSTGRES_USER: ${DB_USER:-energy}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-energy}
    ports:
      - "${DB_PORT_EXTERNAL:-5432}:5432"
    volumes:
      - timescaledb_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-energy} -d ${DB_NAME:-energy_management}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Redis: Message Broker für Celery ──
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "${REDIS_PORT_EXTERNAL:-6379}:6379"
    volumes:
      - redis_data:/data
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── App: Backend + Frontend + Celery ──
  app:
    build:
      context: ../../
      dockerfile: deploy/standalone/Dockerfile
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8099}:8099"
    volumes:
      - app_data:/data
    environment:
      DATABASE_URL: "postgresql+asyncpg://${DB_USER:-energy}:${DB_PASSWORD:-energy}@timescaledb:5432/${DB_NAME:-energy_management}"
      REDIS_URL: "redis://redis:6379/0"
      SECRET_KEY: ${SECRET_KEY:-CHANGE-ME-use-a-random-64-char-hex-string}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LANGUAGE: ${LANGUAGE:-de}
      UPLOAD_DIR: /data/uploads
      REPORT_PDF_DIR: /data/reports
      DEPLOYMENT_MODE: standalone
      # Home Assistant als optionale Datenquelle (leer lassen wenn nicht genutzt)
      HA_ACCESS_TOKEN: ${HA_ACCESS_TOKEN:-}
      HA_BASE_URL: ${HA_BASE_URL:-}
      # Externe APIs
      ELECTRICITY_MAPS_API_KEY: ${ELECTRICITY_MAPS_API_KEY:-}
      BRIGHT_SKY_ENABLED: ${BRIGHT_SKY_ENABLED:-true}
      # Interne Verbindungsparameter (für Healthchecks im Entrypoint)
      DB_HOST: timescaledb
      DB_PORT: "5432"
      DB_USER: ${DB_USER:-energy}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    dns:
      - 8.8.8.8
      - 8.8.4.4
    extra_hosts:
      - "energy-as-a-service.spie-es.de:81.95.3.70"
    depends_on:
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  timescaledb_data:
  redis_data:
  app_data:
