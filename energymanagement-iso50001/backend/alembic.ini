# ===========================================================================
# Alembic-Konfiguration für Datenbank-Migrationen
# ===========================================================================
# Alembic verwaltet Änderungen am Datenbankschema (Tabellen hinzufügen,
# Spalten ändern, etc.). Jede Änderung wird als "Migration" gespeichert,
# die vorwärts und rückwärts ausgeführt werden kann.
# ===========================================================================

[alembic]
# Pfad zu den Migrationsskripten
script_location = alembic

# Template für neue Migrations-Dateien
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(rev)s_%%(slug)s

# Datenbankverbindung – wird in env.py aus der App-Konfiguration gelesen
# sqlalchemy.url wird dort programmatisch gesetzt
sqlalchemy.url = driver://user:pass@localhost/dbname

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
